# Failure-mode subset ablation: slip + command_mismatch.
# Tests the step-count majority channels jointly.

name: "ablation_failure_modes_slip_cm"
condition: "adapted"
description: >
  Mode-subset ablation, ff=0.5 fixed. Curriculum restricted to
  slip and command_mismatch trajectories (the two modes that
  together account for ~0.56 of active failure-flagged steps in
  the pool). Hypothesis: if combined step-count exposure
  dominates, this cell reproduces v0.3.0 ff=0.5 lift.

training:
  env_config: "configs/env/slippery.yaml"
  adapt_config: "configs/train/adaptation.yaml"
  num_envs: 4096
  max_iterations: 200
  device: "cuda:0"
  seed: 42

curriculum:
  failure_dir: "data/failures"
  failure_fraction: 0.5
  failure_modes: ["slip", "command_mismatch"]
  num_variations: 16

evaluation:
  num_episodes: 128
  num_envs: 32
  eval_envs: ["rough", "slippery"]
  record_video: false

phoenix_root: "../../workspace/go2-phoenix"
tags: ["ablation", "failure-mode-subset", "ff0p5", "slip-cm"]

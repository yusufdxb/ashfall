# Ashfall failure taxonomy configuration
# Thresholds for all 6 failure modes — tuned for Unitree GO2.

thresholds:
  # Attitude loss
  pitch_rad: 0.8
  roll_rad: 0.6

  # Body collapse
  base_height_min_m: 0.15

  # Foot slip
  slip_velocity_cmd_min: 0.3
  slip_velocity_actual_max: 0.05
  slip_min_duration_s: 0.5

  # Stumble
  stumble_joint_vel_spike: 15.0
  stumble_min_feet_in_contact: 2

  # Contact loss
  contact_force_min_n: 5.0
  contact_loss_min_feet: 2
  contact_loss_min_duration_s: 0.1

  # Command mismatch
  cmd_mismatch_vel_error: 0.4
  cmd_mismatch_min_cmd_speed: 0.2
  cmd_mismatch_min_duration_s: 1.0

  # Global
  min_event_gap_s: 1.0

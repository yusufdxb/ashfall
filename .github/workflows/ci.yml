name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Install (dev extra, no sim/torch)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Pytest (no-sim suite)
        run: pytest -q -m "not sim"
